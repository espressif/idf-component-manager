variables:
  FF_TIMESTAMPS: true
  # Versioned esp-idf-doc env image used for building and deploying documentation with ESP-Docs
  ESP_DOCS_ENV_IMAGE: "$CI_REGISTRY/ci/images/idf-v6.1-docs:1"
  DOCLANG: "en"
  # Git branch that ESP-Docs deploys as the "latest" documentation version
  ESP_DOCS_LATEST_BRANCH_NAME: "main"

default:
  image: python:3.14-trixie

stages:
  - check
  - build
  - test
  - deploy

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS && $CI_PIPELINE_SOURCE == "push"
      when: never
    - if: "$CI_COMMIT_BRANCH"

.check:
  stage: check
  tags:
    - lint
    - internet

check_manifest_format_changes:
  extends: .check
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - |
      if git diff-tree --name-only -r --no-commit-id "origin/${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}" "${CI_COMMIT_SHA}" | grep -q "schemas.py"; then
        [[ "${CI_MERGE_REQUEST_LABELS}" =~ ^(.*,)*manifest_changes_handled(,.*)*$ ]] || \
          (echo "Please create a registry MR and add 'manifest_changes_handled' label if necessary" && exit 1)
      fi

check_tests:
  extends: .check
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - |
      (git diff-tree --name-only -r --no-commit-id "origin/${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}" "${CI_COMMIT_SHA}" | (grep "tests/" || grep "integration_tests/")) || \
        [[ "${CI_MERGE_REQUEST_LABELS}" =~ ^(.*,)*no_tests(,.*)*$ ]] || \
        (echo "Please either cover changes with tests or add 'no_tests' label" && exit 1)

pre-commit-mr:
  stage: check
  extends: .check
  before_script:
    - pip install '.[dev]'
  script:
    - echo "Merge request is from ${CI_COMMIT_REF_NAME} into ${CI_MERGE_REQUEST_TARGET_BRANCH_NAME}"
    - git fetch origin ${CI_MERGE_REQUEST_TARGET_BRANCH_NAME} ${CI_COMMIT_REF_NAME}
    - export from_sha=$(git merge-base HEAD origin/${CI_MERGE_REQUEST_TARGET_BRANCH_NAME})
    - echo "Checking changes from ${from_sha} to ${CI_COMMIT_SHA}:"
    - git log --oneline ${from_sha}..${CI_COMMIT_SHA}
    - echo "Modified files:"
    - git diff-tree --no-commit-id --name-only -r ${from_sha} ${CI_COMMIT_SHA}
    - echo "Running pre-commit:"
    - pre-commit run --from ${from_sha} --to ${CI_COMMIT_SHA}
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"' # Include this job in merge request pipelines, only

prepare_tests:
  extends: .check
  before_script:
    - pip install jinja2
  script:
    - python ci/prepare_tests.py
  artifacts:
    paths:
      - ci/tests.yml

.build-docs:
  stage: build
  image: $ESP_DOCS_ENV_IMAGE
  tags:
    - internet
  before_script:
    - pip install '.[docs]'

build-docs:
  extends: .build-docs
  script:
    - cd docs
    - build-docs -l $DOCLANG
  after_script:
    - 'echo "preview link: ${GITLAB_PAGE_HTTPS_URL}/-/idf-component-manager/-/jobs/${CI_JOB_ID}/artifacts/docs/_build/${DOCLANG}/generic/html/index.html"'
  artifacts:
    paths:
      - docs/_build/
    when: always
    expire_in: 4 days
  rules:
    - if: '$CI_MERGE_REQUEST_LABELS =~ /skip_docs/'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH =~ /^release\/v.*/

build-main-docs:
  extends: .build-docs
  # The base branch is built only to render a docs diff against the MR changes.
  # It is allowed to fail because the base revision may use an incompatible docs
  # toolchain (e.g. the commit before the ESP-Docs migration still used
  # sphinx_rtd_theme / plain sphinx-build and cannot be built with build-docs).
  allow_failure: true
  script:
    - git checkout -f HEAD~1  # merged result pipeline
    - cd docs
    - build-docs -l $DOCLANG
    - cd ..
    - mv docs/_build/${DOCLANG}/generic/html html_output_main
  artifacts:
    paths:
      - html_output_main/
    when: always
    expire_in: 4 days
  rules:
    - if: '$CI_MERGE_REQUEST_LABELS =~ /skip_docs/'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

diff-docs:
  stage: test
  tags:
    - internet
  allow_failure: true
  needs:
    - build-docs
    - job: build-main-docs
      artifacts: true
      optional: true
  script:
    - pip install prettytable python-gitlab
    - python ci/diff_docs.py html_output_main docs/_build/${DOCLANG}/generic/html --output html_diff
  artifacts:
    paths:
      - html_diff/
    when: always
    expire_in: 4 days
    expose_as: docs_diff
  rules:
    - if: '$CI_MERGE_REQUEST_LABELS =~ /skip_docs/'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# -- Deploy documentation to docs.espressif.com via ESP-Docs ------------------
.deploy-docs:
  stage: deploy
  image: $ESP_DOCS_ENV_IMAGE
  tags:
    - internet
  needs:
    - build-docs
  variables:
    DOCS_BUILD_DIR: "${CI_PROJECT_DIR}/docs/_build/"
  before_script:
    - pip install '.[docs]'
  script:
    # Install the SSH key so that deploy-docs can scp/ssh the built docs to the
    # docs server.
    - source ci/utils.sh
    - add_doc_server_ssh_keys "$DOCS_DEPLOY_PRIVATEKEY" "$DOCS_DEPLOY_SERVER" "$DOCS_DEPLOY_SERVER_USER"
    - export GIT_VER=$(git describe --abbrev=10 --always)
    - deploy-docs

deploy-preview-docs:
  extends: .deploy-docs
  variables:
    TYPE: "preview"
    DOCS_DEPLOY_PRIVATEKEY: "$DOCS_PREVIEW_PRIVATEKEY"
    DOCS_DEPLOY_SERVER: "preview-docs.espressif.com"
    DOCS_DEPLOY_SERVER_USER: "$DOCS_PREVIEW_SERVER_USER"
    DOCS_DEPLOY_PATH: "projects/idf-component-manager"
    DOCS_DEPLOY_URL_BASE: "https://preview-docs.espressif.com/projects/idf-component-manager"
  rules:
    - if: '$CI_MERGE_REQUEST_LABELS =~ /skip_docs/'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

deploy-prod-docs:
  extends: .deploy-docs
  variables:
    TYPE: "prod"
    DEPLOY_STABLE: "1"
    DOCS_DEPLOY_PRIVATEKEY: "$DOCS_PROD_PRIVATEKEY"
    DOCS_DEPLOY_SERVER: "docs.espressif.com"
    DOCS_DEPLOY_SERVER_USER: "$DOCS_PROD_SERVER_USER"
    DOCS_DEPLOY_PATH: "projects/idf-component-manager"
    DOCS_DEPLOY_URL_BASE: "https://docs.espressif.com/projects/idf-component-manager"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

tests:
  stage: test
  needs:
    - prepare_tests
  trigger:
    strategy: mirror
    forward:
      pipeline_variables: true
    include:
      - artifact: ci/tests.yml
        job: prepare_tests

publish_on_pypi:
  stage: deploy
  tags:
    - internet
  variables:
    TWINE_NON_INTERACTIVE: "true"
    TWINE_USERNAME: __token__
    TWINE_PASSWORD: ${PYPI_TOKEN}
  before_script:
    - apt update && apt install curl jq -y
    - pip install build twine
  script:
    - ./publish.sh
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH =~ /^release\/v.*/

include:
  - project: "espressif/shared-ci-dangerjs"
    ref: master
    file: "danger.yaml"
  - local: ci/common.yml

run-danger-mr-linter:
  stage: check
  variables:
    ENABLE_CHECK_UPDATED_CHANGELOG: "false"
    COMMIT_MESSAGE_ALLOWED_TYPES: "change,chore,ci,docs,feat,fix,refactor,remove,revert,test"
